<!--
THROWAWAY PROTOTYPE - wipe me.
Three variants of the hospital/product SKU settings page, switchable via ?variant=A/B/C.
No API calls, no persistence, in-memory sample state only.
-->
<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>醫院產品規則 Mock</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        :root {
            --page: #f6f7f9;
            --paper: #ffffff;
            --paper-2: #fbfcfd;
            --ink: #20242a;
            --muted: #65717f;
            --soft: #8a96a5;
            --line: #d9dee5;
            --line-strong: #bfc7d1;
            --teal: #087f8c;
            --teal-soft: #d8f1f3;
            --coral: #c4492d;
            --coral-soft: #fde7df;
            --mustard: #a26a00;
            --mustard-soft: #fff1c9;
            --green: #2e7d4f;
            --green-soft: #ddf4e6;
            --black: #111418;
            --shadow: 0 18px 50px rgba(27, 35, 45, 0.10);
            --radius: 8px;
            --radius-sm: 6px;
        }

        html {
            min-height: 100%;
            background: var(--page);
        }

        body {
            margin: 0;
            color: var(--ink);
            font-family: Aptos, "Noto Sans TC", "Segoe UI", sans-serif;
            font-size: 14px;
            line-height: 1.45;
            min-height: 100vh;
        }

        button,
        input,
        select {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        .shell {
            min-height: 100vh;
            padding-bottom: 96px;
        }

        .topbar {
            align-items: center;
            background: var(--paper);
            border-bottom: 1px solid var(--line);
            display: flex;
            gap: 18px;
            justify-content: space-between;
            min-height: 68px;
            padding: 0 28px;
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .brand {
            align-items: center;
            display: flex;
            gap: 12px;
            min-width: 0;
        }

        .mark {
            align-items: center;
            background: var(--black);
            border-radius: var(--radius-sm);
            color: #fff;
            display: inline-flex;
            font-weight: 800;
            height: 34px;
            justify-content: center;
            width: 34px;
        }

        .brand-title {
            display: grid;
            gap: 1px;
            min-width: 0;
        }

        .brand-title strong {
            font-size: 17px;
            line-height: 1.2;
        }

        .brand-title span {
            color: var(--muted);
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .top-actions {
            align-items: center;
            display: flex;
            gap: 8px;
            min-width: 0;
        }

        .btn {
            align-items: center;
            border: 1px solid var(--line-strong);
            border-radius: var(--radius-sm);
            display: inline-flex;
            gap: 8px;
            justify-content: center;
            min-height: 36px;
            padding: 8px 12px;
            transition: background .16s ease, border-color .16s ease, color .16s ease, transform .16s ease;
            white-space: nowrap;
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-primary {
            background: var(--black);
            border-color: var(--black);
            color: #fff;
        }

        .btn-primary:hover {
            background: #333941;
            border-color: #333941;
        }

        .btn-secondary {
            background: #fff;
            color: var(--ink);
        }

        .btn-secondary:hover,
        .icon-btn:hover {
            background: var(--paper-2);
            border-color: var(--muted);
        }

        .icon-btn {
            align-items: center;
            background: #fff;
            border: 1px solid var(--line-strong);
            border-radius: var(--radius-sm);
            color: var(--ink);
            display: inline-flex;
            font-weight: 800;
            height: 36px;
            justify-content: center;
            width: 36px;
        }

        .page {
            padding: 22px 28px 40px;
        }

        .page-head {
            align-items: end;
            display: flex;
            gap: 18px;
            justify-content: space-between;
            margin: 0 auto 18px;
            max-width: 1440px;
        }

        .page-title {
            display: grid;
            gap: 4px;
        }

        h1,
        h2,
        h3,
        p {
            margin: 0;
        }

        h1 {
            font-size: 28px;
            line-height: 1.1;
        }

        h2 {
            font-size: 17px;
            line-height: 1.2;
        }

        h3 {
            font-size: 14px;
            line-height: 1.25;
        }

        .page-subtitle {
            color: var(--muted);
            max-width: 620px;
        }

        .meta-strip {
            align-items: center;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
        }

        .pill,
        .chip {
            align-items: center;
            border-radius: 999px;
            display: inline-flex;
            font-size: 12px;
            font-weight: 700;
            gap: 6px;
            min-height: 28px;
            padding: 5px 9px;
            white-space: nowrap;
        }

        .pill {
            background: #fff;
            border: 1px solid var(--line);
            color: var(--muted);
        }

        .pill-hot {
            background: var(--coral-soft);
            border-color: #f2b9a7;
            color: var(--coral);
        }

        .pill-good {
            background: var(--green-soft);
            border-color: #b5dfc6;
            color: var(--green);
        }

        .pill-warn {
            background: var(--mustard-soft);
            border-color: #e6c977;
            color: var(--mustard);
        }

        .surface {
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .panel {
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: var(--radius);
        }

        .panel-head {
            align-items: center;
            border-bottom: 1px solid var(--line);
            display: flex;
            gap: 12px;
            justify-content: space-between;
            min-height: 52px;
            padding: 12px 14px;
        }

        .panel-body {
            padding: 14px;
        }

        .muted {
            color: var(--muted);
        }

        .tiny {
            color: var(--soft);
            font-size: 12px;
        }

        .search {
            align-items: center;
            background: var(--paper-2);
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            display: flex;
            gap: 8px;
            min-height: 36px;
            padding: 0 10px;
        }

        .search input {
            background: transparent;
            border: 0;
            color: var(--ink);
            min-width: 0;
            outline: 0;
            width: 100%;
        }

        .dot {
            border-radius: 999px;
            display: inline-block;
            height: 8px;
            width: 8px;
        }

        .dot-teal {
            background: var(--teal);
        }

        .dot-coral {
            background: var(--coral);
        }

        .dot-mustard {
            background: var(--mustard);
        }

        .variant {
            display: none;
            margin: 0 auto;
            max-width: 1440px;
        }

        .variant.is-active {
            display: block;
        }

        /* Variant A */
        .workbench {
            display: grid;
            gap: 14px;
            grid-template-columns: minmax(220px, 270px) minmax(420px, 1fr) minmax(280px, 360px);
        }

        .hospital-list {
            display: grid;
            gap: 8px;
        }

        .hospital-row {
            background: var(--paper-2);
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            color: var(--ink);
            display: grid;
            gap: 4px;
            padding: 10px;
            text-align: left;
            width: 100%;
        }

        .hospital-row.active {
            background: var(--teal-soft);
            border-color: #8fcfd4;
        }

        .hospital-row strong,
        .rule-title strong {
            overflow-wrap: anywhere;
        }

        .dept-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .dept-tab {
            background: #fff;
            border: 1px solid var(--line-strong);
            border-radius: var(--radius-sm);
            color: var(--ink);
            min-height: 34px;
            padding: 7px 10px;
        }

        .dept-tab.active {
            background: var(--black);
            border-color: var(--black);
            color: #fff;
        }

        .rule-summary {
            align-items: start;
            display: grid;
            gap: 12px;
            grid-template-columns: 1fr auto;
            margin-bottom: 14px;
        }

        .rule-title {
            display: grid;
            gap: 5px;
        }

        .sku-stack {
            display: grid;
            gap: 9px;
        }

        .sku-row {
            align-items: center;
            background: var(--paper-2);
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            display: grid;
            gap: 10px;
            grid-template-columns: auto minmax(0, 1fr) auto;
            min-height: 58px;
            padding: 10px;
        }

        .sku-row.selected {
            background: var(--green-soft);
            border-color: #aad7bc;
        }

        .sku-code {
            color: var(--muted);
            font-family: "Cascadia Mono", Consolas, monospace;
            font-size: 12px;
            overflow-wrap: anywhere;
        }

        .sku-name {
            display: grid;
            gap: 2px;
            min-width: 0;
        }

        .sku-action {
            background: #fff;
            border: 1px solid var(--line-strong);
            border-radius: var(--radius-sm);
            color: var(--ink);
            min-height: 32px;
            padding: 5px 9px;
        }

        .product-group {
            display: grid;
            gap: 8px;
        }

        .group-label {
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            margin-top: 6px;
            text-transform: uppercase;
        }

        .state-box {
            background: #111418;
            border-radius: var(--radius-sm);
            color: #d6e6ed;
            font-family: "Cascadia Mono", Consolas, monospace;
            font-size: 11px;
            max-height: 240px;
            overflow: auto;
            padding: 12px;
            white-space: pre-wrap;
        }

        /* Variant B */
        .matrix-layout {
            display: grid;
            gap: 14px;
        }

        .matrix-toolbar {
            align-items: center;
            display: grid;
            gap: 12px;
            grid-template-columns: minmax(220px, 1fr) auto auto;
        }

        .matrix-wrap {
            overflow-x: auto;
        }

        .matrix-table {
            border-collapse: separate;
            border-spacing: 0;
            min-width: 920px;
            width: 100%;
        }

        .matrix-table th,
        .matrix-table td {
            border-bottom: 1px solid var(--line);
            border-right: 1px solid var(--line);
            padding: 12px;
            text-align: left;
            vertical-align: top;
        }

        .matrix-table th:first-child,
        .matrix-table td:first-child {
            border-left: 0;
            min-width: 190px;
            position: sticky;
            left: 0;
            z-index: 5;
        }

        .matrix-table th:first-child {
            background: var(--paper);
            z-index: 7;
        }

        .matrix-table td:first-child {
            background: var(--paper-2);
        }

        .matrix-table th {
            background: #eef2f6;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
        }

        .matrix-cell {
            display: grid;
            gap: 8px;
            min-height: 112px;
            min-width: 190px;
        }

        .cell-products {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .chip {
            border: 1px solid var(--line);
            color: var(--ink);
        }

        .chip-uri {
            background: var(--teal-soft);
            border-color: #9ed4d8;
        }

        .chip-eli {
            background: var(--coral-soft);
            border-color: #f0b59f;
        }

        .chip-oxb {
            background: var(--mustard-soft);
            border-color: #e6c977;
        }

        .chip-empty {
            background: #f0f2f4;
            color: var(--soft);
        }

        /* Variant C */
        .planner {
            display: grid;
            gap: 14px;
            grid-template-columns: minmax(280px, 360px) minmax(420px, 1fr);
        }

        .deck {
            display: grid;
            gap: 10px;
        }

        .deck-card {
            background: var(--paper);
            border: 1px solid var(--line);
            border-left: 5px solid var(--teal);
            border-radius: var(--radius);
            display: grid;
            gap: 8px;
            padding: 14px;
        }

        .deck-card.hot {
            border-left-color: var(--coral);
        }

        .deck-card.warn {
            border-left-color: var(--mustard);
        }

        .wizard {
            display: grid;
            gap: 14px;
        }

        .step-grid {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .step {
            background: var(--paper-2);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            display: grid;
            gap: 9px;
            padding: 14px;
        }

        .step-number {
            align-items: center;
            background: var(--black);
            border-radius: 999px;
            color: #fff;
            display: inline-flex;
            font-size: 12px;
            font-weight: 800;
            height: 24px;
            justify-content: center;
            width: 24px;
        }

        .select-grid {
            display: grid;
            gap: 8px;
        }

        .select-grid select {
            appearance: none;
            background: #fff;
            border: 1px solid var(--line-strong);
            border-radius: var(--radius-sm);
            color: var(--ink);
            min-height: 38px;
            padding: 8px 10px;
            width: 100%;
        }

        .preview-list {
            display: grid;
            gap: 8px;
        }

        .preview-row {
            align-items: center;
            background: var(--paper-2);
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            display: grid;
            gap: 10px;
            grid-template-columns: auto 1fr auto;
            padding: 10px;
        }

        .line-path {
            color: var(--muted);
            font-family: "Cascadia Mono", Consolas, monospace;
            font-size: 12px;
        }

        .switcher {
            align-items: center;
            background: var(--black);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 999px;
            bottom: 22px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, .28);
            color: #fff;
            display: flex;
            gap: 10px;
            left: 50%;
            padding: 8px;
            position: fixed;
            transform: translateX(-50%);
            z-index: 60;
        }

        .switcher button {
            background: rgba(255, 255, 255, .10);
            border: 1px solid rgba(255, 255, 255, .20);
            border-radius: 999px;
            color: #fff;
            font-weight: 900;
            height: 36px;
            width: 36px;
        }

        .switcher button:hover {
            background: rgba(255, 255, 255, .18);
        }

        .switcher-label {
            font-size: 12px;
            font-weight: 800;
            min-width: 154px;
            text-align: center;
            white-space: nowrap;
        }

        @media (max-width: 1120px) {
            .workbench,
            .planner {
                grid-template-columns: 1fr;
            }

            .step-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 720px) {
            .topbar,
            .page {
                padding-left: 14px;
                padding-right: 14px;
            }

            .topbar,
            .page-head,
            .matrix-toolbar {
                align-items: stretch;
                flex-direction: column;
                grid-template-columns: 1fr;
            }

            .topbar {
                min-height: auto;
                padding-bottom: 12px;
                padding-top: 12px;
            }

            .top-actions,
            .meta-strip {
                justify-content: flex-start;
                overflow-x: auto;
            }

            h1 {
                font-size: 23px;
            }

            .rule-summary,
            .preview-row {
                grid-template-columns: 1fr;
            }

            .switcher {
                bottom: 12px;
                width: calc(100% - 24px);
            }

            .switcher-label {
                flex: 1;
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
            }
        }
    </style>
</head>

<body>
    <div class="shell">
        <header class="topbar">
            <div class="brand">
                <span class="mark">Rx</span>
                <div class="brand-title">
                    <strong>醫院產品規則</strong>
                    <span>SKU 鎖定、科別 fallback、CRM 產品編號對應</span>
                </div>
            </div>
            <div class="top-actions">
                <button class="btn btn-secondary" type="button" data-action="reset">還原假資料</button>
                <button class="btn btn-primary" type="button">儲存草稿</button>
            </div>
        </header>

        <main class="page">
            <div class="page-head">
                <div class="page-title">
                    <h1 id="variantTitle">設定頁 Mock</h1>
                    <p class="page-subtitle" id="variantSubtitle"></p>
                </div>
                <div class="meta-strip">
                    <span class="pill pill-good">4 家醫院</span>
                    <span class="pill pill-hot">3 個 ELI SKU</span>
                    <span class="pill pill-warn">2 筆鎖定規則</span>
                </div>
            </div>

            <section id="variantA" class="variant" aria-label="Variant A"></section>
            <section id="variantB" class="variant" aria-label="Variant B"></section>
            <section id="variantC" class="variant" aria-label="Variant C"></section>
        </main>
    </div>

    <div class="switcher" role="group" aria-label="Prototype variant switcher">
        <button type="button" data-action="prevVariant" aria-label="上一個版本">←</button>
        <div class="switcher-label" id="switcherLabel">A - 工作台</div>
        <button type="button" data-action="nextVariant" aria-label="下一個版本">→</button>
    </div>

    <script>
        const seed = {
            selectedHospitalId: "skh",
            selectedDept: "URO",
            hospitals: [
                {
                    id: "skh",
                    name: "新光醫院",
                    aliases: ["新光", "新光醫院"],
                    rules: {
                        URO: { mode: "locked", products: ["uri", "eli_45"], note: "院內主跑六個月劑量" },
                        PED: { mode: "locked", products: ["eli_45", "oxb"], note: "小兒科只開六個月劑量" }
                    }
                },
                {
                    id: "tzuchi",
                    name: "慈濟台北",
                    aliases: ["慈濟", "台北慈濟"],
                    rules: {
                        URO: { mode: "locked", products: ["uri", "eli_22_5"], note: "泌尿科固定三個月劑量" }
                    }
                },
                {
                    id: "cth",
                    name: "耕莘永和",
                    aliases: ["耕莘", "耕莘永和"],
                    rules: {
                        URO: { mode: "fallback", products: [], note: "" },
                        OBS: { mode: "locked", products: ["ysl", "esv"], note: "婦產科不跑 OXB" }
                    }
                },
                {
                    id: "ak",
                    name: "耕莘安康",
                    aliases: ["安康", "耕莘安康"],
                    rules: {
                        URO: { mode: "locked", products: ["uri"], note: "只跑 Urief" }
                    }
                }
            ],
            departments: [
                { code: "URO", name: "泌尿科" },
                { code: "PED", name: "小兒科" },
                { code: "OBS", name: "婦產科" },
                { code: "FM", name: "家醫科" }
            ],
            departmentDefaults: {
                URO: ["uri", "eli_22_5", "oxb"],
                PED: ["eli_45", "oxb"],
                OBS: ["ysl", "esv", "lmn", "oxb"],
                FM: ["uri", "oxb"]
            },
            products: [
                { code: "uri", family: "Urief", name: "URI-T8 優列扶 8mg", crmId: "21363", group: "BPH" },
                { code: "eli_7_5", family: "Eligard", name: "ELI 7.5 一個月劑量", crmId: "T5EL0", group: "Eligard" },
                { code: "eli_22_5", family: "Eligard", name: "ELI 22.5 三個月劑量", crmId: "T5EL1", group: "Eligard" },
                { code: "eli_45", family: "Eligard", name: "ELI 45 六個月劑量", crmId: "T5EL2", group: "Eligard" },
                { code: "oxb", family: "Oxbu", name: "OXB5 歐舒緩釋錠 5mg", crmId: "21052", group: "OAB" },
                { code: "ysl", family: "Yselty", name: "Yselty 口服錠", crmId: "21711", group: "婦產" },
                { code: "esv", family: "ESVATIN", name: "ESVATIN 陰道錠", crmId: "90064", group: "婦產" },
                { code: "lmn", family: "Lomexin", name: "Lomexin 陰道軟膠囊", crmId: "T6LM0", group: "婦產" }
            ]
        };

        const variantMeta = {
            A: {
                name: "工作台",
                title: "Variant A - 工作台式設定",
                subtitle: "左邊選醫院，中間鎖科別規則，右邊看 SKU 群組與目前 state。"
            },
            B: {
                name: "矩陣",
                title: "Variant B - 醫院科別矩陣",
                subtitle: "一次掃描所有醫院與科別，適合快速檢查哪裡被鎖定、哪裡走 fallback。"
            },
            C: {
                name: "流程",
                title: "Variant C - 規則建立流程",
                subtitle: "把新增規則拆成選醫院、選科別、選 SKU 三段，旁邊即時看預覽。"
            }
        };

        let state = structuredClone(seed);
        const variants = ["A", "B", "C"];

        function currentVariant() {
            const param = new URLSearchParams(window.location.search).get("variant");
            return variants.includes(param) ? param : "A";
        }

        function setVariant(next) {
            const url = new URL(window.location.href);
            url.searchParams.set("variant", next);
            window.history.replaceState({}, "", url);
            render();
        }

        function cycleVariant(delta) {
            const current = currentVariant();
            const index = variants.indexOf(current);
            const next = variants[(index + delta + variants.length) % variants.length];
            setVariant(next);
        }

        function selectedHospital() {
            return state.hospitals.find(h => h.id === state.selectedHospitalId) || state.hospitals[0];
        }

        function selectedRule() {
            const hospital = selectedHospital();
            hospital.rules[state.selectedDept] ||= { mode: "fallback", products: [], note: "" };
            return hospital.rules[state.selectedDept];
        }

        function effectiveProducts(hospital, deptCode) {
            const rule = hospital.rules[deptCode];
            if (rule?.mode === "locked") return rule.products;
            return state.departmentDefaults[deptCode] || [];
        }

        function productByCode(code) {
            return state.products.find(p => p.code === code);
        }

        function chipClass(code) {
            if (code.startsWith("eli")) return "chip-eli";
            if (code === "uri") return "chip-uri";
            if (code === "oxb") return "chip-oxb";
            return "";
        }

        function productChip(code) {
            const product = productByCode(code);
            if (!product) return `<span class="chip chip-empty">${escapeHtml(code)}</span>`;
            return `<span class="chip ${chipClass(code)}">${escapeHtml(product.family)} <span class="sku-code">${escapeHtml(product.crmId)}</span></span>`;
        }

        function lockPill(mode) {
            return mode === "locked"
                ? `<span class="pill pill-hot">鎖定</span>`
                : `<span class="pill">Fallback</span>`;
        }

        function renderVariantA() {
            const hospital = selectedHospital();
            const rule = selectedRule();
            const effective = effectiveProducts(hospital, state.selectedDept);
            const grouped = groupProducts();

            document.getElementById("variantA").innerHTML = `
                <div class="workbench">
                    <aside class="panel">
                        <div class="panel-head">
                            <h2>醫院</h2>
                            <button class="icon-btn" type="button" aria-label="新增醫院">+</button>
                        </div>
                        <div class="panel-body">
                            <label class="search" aria-label="搜尋醫院">
                                <span>⌕</span>
                                <input value="" placeholder="搜尋醫院或別名">
                            </label>
                            <div class="hospital-list" style="margin-top: 12px;">
                                ${state.hospitals.map(h => `
                                    <button class="hospital-row ${h.id === hospital.id ? "active" : ""}" type="button" data-action="selectHospital" data-hospital="${h.id}">
                                        <strong>${escapeHtml(h.name)}</strong>
                                        <span class="tiny">${escapeHtml(h.aliases.join(" / "))}</span>
                                        <span class="tiny">${Object.values(h.rules).filter(r => r.mode === "locked").length} locked rules</span>
                                    </button>
                                `).join("")}
                            </div>
                        </div>
                    </aside>

                    <section class="surface">
                        <div class="panel-head">
                            <div>
                                <h2>${escapeHtml(hospital.name)}</h2>
                                <p class="tiny">${escapeHtml(hospital.aliases.join(" / "))}</p>
                            </div>
                            <button class="btn ${rule.mode === "locked" ? "btn-primary" : "btn-secondary"}" type="button" data-action="toggleLock">
                                ${rule.mode === "locked" ? "已鎖定" : "鎖定此科別"}
                            </button>
                        </div>
                        <div class="panel-body">
                            <div class="dept-tabs" role="tablist">
                                ${state.departments.map(dept => `
                                    <button class="dept-tab ${dept.code === state.selectedDept ? "active" : ""}" type="button" data-action="selectDept" data-dept="${dept.code}">
                                        ${escapeHtml(dept.name)} ${escapeHtml(dept.code)}
                                    </button>
                                `).join("")}
                            </div>

                            <div style="height: 14px;"></div>

                            <div class="rule-summary">
                                <div class="rule-title">
                                    <span class="tiny">目前規則</span>
                                    <strong>${escapeHtml(hospital.name)} / ${escapeHtml(state.selectedDept)} / ${escapeHtml(deptName(state.selectedDept))}</strong>
                                    <span class="muted">${rule.mode === "locked" ? "使用下方鎖定 SKU，不再由系統改 ELI 劑量。" : "沒有鎖定時，會使用科別預設 SKU。"}</span>
                                </div>
                                ${lockPill(rule.mode)}
                            </div>

                            <div class="sku-stack">
                                ${state.products.map(product => `
                                    <div class="sku-row ${effective.includes(product.code) ? "selected" : ""}">
                                        <span class="dot ${product.code.startsWith("eli") ? "dot-coral" : product.code === "uri" ? "dot-teal" : "dot-mustard"}"></span>
                                        <div class="sku-name">
                                            <strong>${escapeHtml(product.name)}</strong>
                                            <span class="sku-code">${escapeHtml(product.code)} / CRM ${escapeHtml(product.crmId)}</span>
                                        </div>
                                        <button class="sku-action" type="button" data-action="toggleSku" data-code="${product.code}">
                                            ${rule.products.includes(product.code) ? "移除" : "加入"}
                                        </button>
                                    </div>
                                `).join("")}
                            </div>
                        </div>
                    </section>

                    <aside class="panel">
                        <div class="panel-head">
                            <h2>SKU 群組</h2>
                            <span class="pill">Preview</span>
                        </div>
                        <div class="panel-body product-group">
                            ${Object.entries(grouped).map(([group, items]) => `
                                <div class="group-label">${escapeHtml(group)}</div>
                                ${items.map(p => `
                                    <div class="sku-row ${effective.includes(p.code) ? "selected" : ""}">
                                        <span class="dot ${p.code.startsWith("eli") ? "dot-coral" : "dot-teal"}"></span>
                                        <div class="sku-name">
                                            <strong>${escapeHtml(p.family)}</strong>
                                            <span class="sku-code">${escapeHtml(p.name)} / ${escapeHtml(p.crmId)}</span>
                                        </div>
                                    </div>
                                `).join("")}
                            `).join("")}
                            <div class="group-label">State</div>
                            <pre class="state-box">${escapeHtml(JSON.stringify({
                                hospital: hospital.name,
                                department: state.selectedDept,
                                mode: rule.mode,
                                products: effective
                            }, null, 2))}</pre>
                        </div>
                    </aside>
                </div>
            `;
        }

        function renderVariantB() {
            document.getElementById("variantB").innerHTML = `
                <div class="matrix-layout">
                    <div class="surface">
                        <div class="panel-body matrix-toolbar">
                            <label class="search" aria-label="搜尋矩陣">
                                <span>⌕</span>
                                <input placeholder="搜尋醫院、科別、SKU">
                            </label>
                            <span class="pill pill-hot">Locked 優先</span>
                            <span class="pill">空白使用 fallback</span>
                        </div>
                    </div>

                    <div class="surface matrix-wrap">
                        <table class="matrix-table">
                            <thead>
                                <tr>
                                    <th>醫院</th>
                                    ${state.departments.map(dept => `<th>${escapeHtml(dept.name)}<br><span class="tiny">${escapeHtml(dept.code)}</span></th>`).join("")}
                                </tr>
                            </thead>
                            <tbody>
                                ${state.hospitals.map(hospital => `
                                    <tr>
                                        <td>
                                            <strong>${escapeHtml(hospital.name)}</strong>
                                            <div class="tiny">${escapeHtml(hospital.aliases.join(" / "))}</div>
                                        </td>
                                        ${state.departments.map(dept => {
                                            const rule = hospital.rules[dept.code];
                                            const effective = effectiveProducts(hospital, dept.code);
                                            return `
                                                <td>
                                                    <button class="matrix-cell" type="button" data-action="focusRule" data-hospital="${hospital.id}" data-dept="${dept.code}">
                                                        <span>${lockPill(rule?.mode || "fallback")}</span>
                                                        <span class="cell-products">
                                                            ${effective.length ? effective.map(productChip).join("") : `<span class="chip chip-empty">沒有產品</span>`}
                                                        </span>
                                                        <span class="tiny">${rule?.note ? escapeHtml(rule.note) : "科別預設"}</span>
                                                    </button>
                                                </td>
                                            `;
                                        }).join("")}
                                    </tr>
                                `).join("")}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderVariantC() {
            const hospital = selectedHospital();
            const rule = selectedRule();
            const effective = effectiveProducts(hospital, state.selectedDept);
            const sampleLines = [
                `${hospital.name}/${state.selectedDept}/王醫師/A`,
                `${hospital.aliases[0]}/${deptName(state.selectedDept)}/陳醫師/B`,
                `${hospital.name}/${state.selectedDept}/林醫師/C`
            ];

            document.getElementById("variantC").innerHTML = `
                <div class="planner">
                    <aside class="deck">
                        ${state.hospitals.map(h => {
                            const lockedCount = Object.values(h.rules).filter(r => r.mode === "locked").length;
                            return `
                                <button class="deck-card ${h.id === hospital.id ? "hot" : lockedCount ? "" : "warn"}" type="button" data-action="selectHospital" data-hospital="${h.id}">
                                    <h2>${escapeHtml(h.name)}</h2>
                                    <p class="tiny">${escapeHtml(h.aliases.join(" / "))}</p>
                                    <span class="pill ${lockedCount ? "pill-hot" : "pill-warn"}">${lockedCount} locked</span>
                                </button>
                            `;
                        }).join("")}
                    </aside>

                    <section class="wizard">
                        <div class="surface">
                            <div class="panel-head">
                                <div>
                                    <h2>建立一筆鎖定規則</h2>
                                    <p class="tiny">${escapeHtml(hospital.name)} / ${escapeHtml(deptName(state.selectedDept))}</p>
                                </div>
                                ${lockPill(rule.mode)}
                            </div>
                            <div class="panel-body">
                                <div class="step-grid">
                                    <div class="step">
                                        <span class="step-number">1</span>
                                        <h3>醫院</h3>
                                        <div class="select-grid">
                                            <select data-action="selectHospitalSelect">
                                                ${state.hospitals.map(h => `<option value="${h.id}" ${h.id === hospital.id ? "selected" : ""}>${escapeHtml(h.name)}</option>`).join("")}
                                            </select>
                                            <span class="tiny">${escapeHtml(hospital.aliases.join(" / "))}</span>
                                        </div>
                                    </div>
                                    <div class="step">
                                        <span class="step-number">2</span>
                                        <h3>科別</h3>
                                        <div class="select-grid">
                                            <select data-action="selectDeptSelect">
                                                ${state.departments.map(d => `<option value="${d.code}" ${d.code === state.selectedDept ? "selected" : ""}>${escapeHtml(d.name)} ${escapeHtml(d.code)}</option>`).join("")}
                                            </select>
                                            <span class="tiny">Fallback: ${(state.departmentDefaults[state.selectedDept] || []).join(", ")}</span>
                                        </div>
                                    </div>
                                    <div class="step">
                                        <span class="step-number">3</span>
                                        <h3>模式</h3>
                                        <button class="btn ${rule.mode === "locked" ? "btn-primary" : "btn-secondary"}" type="button" data-action="toggleLock">
                                            ${rule.mode === "locked" ? "Locked" : "Fallback"}
                                        </button>
                                        <span class="tiny">${rule.mode === "locked" ? "使用固定 SKU" : "使用科別預設"}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="surface">
                            <div class="panel-head">
                                <h2>SKU 選擇</h2>
                                <span class="pill">${effective.length} products</span>
                            </div>
                            <div class="panel-body sku-stack">
                                ${state.products.map(product => `
                                    <div class="sku-row ${effective.includes(product.code) ? "selected" : ""}">
                                        <span class="dot ${product.code.startsWith("eli") ? "dot-coral" : product.code === "uri" ? "dot-teal" : "dot-mustard"}"></span>
                                        <div class="sku-name">
                                            <strong>${escapeHtml(product.name)}</strong>
                                            <span class="sku-code">${escapeHtml(product.code)} / CRM ${escapeHtml(product.crmId)}</span>
                                        </div>
                                        <button class="sku-action" type="button" data-action="toggleSku" data-code="${product.code}">
                                            ${rule.products.includes(product.code) ? "移除" : "加入"}
                                        </button>
                                    </div>
                                `).join("")}
                            </div>
                        </div>

                        <div class="surface">
                            <div class="panel-head">
                                <h2>名單預覽</h2>
                                <span class="pill pill-good">會建立 ${effective.length} 個產品</span>
                            </div>
                            <div class="panel-body preview-list">
                                ${sampleLines.map(line => `
                                    <div class="preview-row">
                                        <span class="dot dot-teal"></span>
                                        <div>
                                            <strong>${escapeHtml(line)}</strong>
                                            <div class="line-path">${effective.map(code => productByCode(code)?.crmId || code).join(" + ") || "NO_PRODUCT"}</div>
                                        </div>
                                        <div class="cell-products">${effective.length ? effective.map(productChip).join("") : `<span class="chip chip-empty">沒有產品</span>`}</div>
                                    </div>
                                `).join("")}
                            </div>
                        </div>
                    </section>
                </div>
            `;
        }

        function groupProducts() {
            return state.products.reduce((groups, product) => {
                groups[product.group] ||= [];
                groups[product.group].push(product);
                return groups;
            }, {});
        }

        function deptName(code) {
            return state.departments.find(dept => dept.code === code)?.name || code;
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function render() {
            const variant = currentVariant();
            const meta = variantMeta[variant];
            document.getElementById("variantTitle").textContent = meta.title;
            document.getElementById("variantSubtitle").textContent = meta.subtitle;
            document.getElementById("switcherLabel").textContent = `${variant} - ${meta.name}`;

            renderVariantA();
            renderVariantB();
            renderVariantC();

            document.querySelectorAll(".variant").forEach(section => section.classList.remove("is-active"));
            document.getElementById(`variant${variant}`).classList.add("is-active");
        }

        document.addEventListener("click", event => {
            const target = event.target.closest("[data-action]");
            if (!target) return;

            const action = target.dataset.action;
            if (action === "prevVariant") cycleVariant(-1);
            if (action === "nextVariant") cycleVariant(1);
            if (action === "selectHospital") {
                state.selectedHospitalId = target.dataset.hospital;
                render();
            }
            if (action === "selectDept") {
                state.selectedDept = target.dataset.dept;
                render();
            }
            if (action === "focusRule") {
                state.selectedHospitalId = target.dataset.hospital;
                state.selectedDept = target.dataset.dept;
                setVariant("A");
            }
            if (action === "toggleLock") {
                const rule = selectedRule();
                if (rule.mode === "locked") {
                    rule.mode = "fallback";
                } else {
                    rule.mode = "locked";
                    if (!rule.products.length) {
                        rule.products = [...(state.departmentDefaults[state.selectedDept] || [])];
                    }
                }
                render();
            }
            if (action === "toggleSku") {
                const rule = selectedRule();
                rule.mode = "locked";
                const code = target.dataset.code;
                if (rule.products.includes(code)) {
                    rule.products = rule.products.filter(item => item !== code);
                } else {
                    rule.products = [...rule.products, code];
                }
                render();
            }
            if (action === "reset") {
                state = structuredClone(seed);
                render();
            }
        });

        document.addEventListener("change", event => {
            const target = event.target.closest("[data-action]");
            if (!target) return;
            if (target.dataset.action === "selectHospitalSelect") {
                state.selectedHospitalId = target.value;
                render();
            }
            if (target.dataset.action === "selectDeptSelect") {
                state.selectedDept = target.value;
                render();
            }
        });

        document.addEventListener("keydown", event => {
            const active = document.activeElement;
            const typing = active && (
                active.tagName === "INPUT" ||
                active.tagName === "TEXTAREA" ||
                active.tagName === "SELECT" ||
                active.isContentEditable
            );
            if (typing) return;
            if (event.key === "ArrowLeft") cycleVariant(-1);
            if (event.key === "ArrowRight") cycleVariant(1);
        });

        render();
    </script>
</body>

</html>
