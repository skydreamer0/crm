<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設定 — CRM 操作介面</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f1117;
            --bg-card: #1a1d28;
            --bg-input: #151821;
            --border: #2a2e3e;
            --text-primary: #e8eaf0;
            --text-secondary: #8b8fa7;
            --text-muted: #5c6078;
            --accent: #6c63ff;
            --accent-soft: rgba(108, 99, 255, 0.15);
            --accent-glow: rgba(108, 99, 255, 0.35);
            --success: #34d399;
            --success-soft: rgba(52, 211, 153, 0.12);
            --warning: #fbbf24;
            --warning-soft: rgba(251, 191, 36, 0.12);
            --gradient-1: linear-gradient(135deg, #6c63ff 0%, #a78bfa 100%);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.4);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .app {
            max-width: 720px;
            margin: 0 auto;
            padding: 32px 24px 48px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .header__logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .header__icon {
            width: 40px;
            height: 40px;
            background: var(--gradient-1);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .header__title {
            font-size: 22px;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--text-primary);
            border-color: var(--text-muted);
        }

        .settings-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px;
            box-shadow: var(--shadow-sm);
        }

        .settings-section + .settings-section {
            margin-top: 18px;
        }

        .settings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 22px;
        }

        .section-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }

        .section-label__dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .settings-status {
            font-size: 12px;
            font-weight: 700;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 6px 10px;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .settings-status.ready {
            border-color: rgba(52, 211, 153, 0.35);
            background: var(--success-soft);
            color: var(--success);
        }

        .settings-status.missing {
            border-color: rgba(251, 191, 36, 0.35);
            background: var(--warning-soft);
            color: var(--warning);
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .settings-field {
            display: grid;
            gap: 7px;
        }

        .settings-field--wide {
            grid-column: 1 / -1;
        }

        .settings-field label,
        .toggle-row span {
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
        }

        .settings-field input[type="text"],
        .settings-field input[type="password"],
        .settings-field input[type="url"] {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            min-height: 42px;
            outline: none;
            padding: 10px 12px;
            transition: var(--transition);
        }

        .settings-field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .field-hint {
            font-size: 11px;
            color: var(--text-muted);
        }

        .toggle-row {
            align-items: center;
            display: flex;
            gap: 10px;
            min-height: 42px;
        }

        .toggle-row input {
            accent-color: var(--accent);
            height: 18px;
            width: 18px;
        }

        .settings-actions {
            align-items: center;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .settings-path {
            margin-top: 18px;
            font-size: 11px;
            color: var(--text-muted);
            font-family: monospace;
            word-break: break-all;
        }

        .section-copy {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.7;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            outline: none;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn--primary {
            background: var(--gradient-1);
            color: #fff;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn--primary:hover {
            box-shadow: 0 6px 24px var(--accent-glow);
            filter: brightness(1.1);
        }

        .btn--secondary {
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn--secondary:hover {
            color: var(--text-primary);
            border-color: var(--text-muted);
        }

        .toast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            padding: 14px 22px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            font-size: 13px;
            color: var(--text-primary);
            z-index: 999;
            transform: translateY(100px);
            opacity: 0;
            transition: var(--transition);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.warning {
            border-color: rgba(251, 191, 36, 0.4);
            background: var(--warning-soft);
        }

        @media (max-width: 640px) {
            .app {
                padding: 20px 14px 40px;
            }

            .settings-section {
                padding: 18px;
            }

            .settings-grid {
                grid-template-columns: 1fr;
            }

            .settings-header,
            .settings-actions {
                align-items: stretch;
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <div class="app">
        <header class="header">
            <div class="header__logo">
                <div class="header__icon">⚙️</div>
                <h1 class="header__title">設定</h1>
            </div>
            <a class="back-link" href="/">← 返回主頁</a>
        </header>

        <section class="settings-section">
            <div class="settings-header">
                <div class="section-label">
                    <span class="section-label__dot"></span>
                    CRM 連線設定
                </div>
                <span id="settingsStatus" class="settings-status missing">尚未設定</span>
            </div>
            <div class="settings-grid">
                <div class="settings-field settings-field--wide">
                    <label for="settingsBaseUrl">CRM網址</label>
                    <input type="url" id="settingsBaseUrl" placeholder="https://crm.example.com/SYNCRM/main.aspx">
                </div>
                <div class="settings-field">
                    <label for="settingsUsername">帳號</label>
                    <input type="text" id="settingsUsername" autocomplete="username">
                </div>
                <div class="settings-field">
                    <label for="settingsPassword">密碼</label>
                    <input type="password" id="settingsPassword" autocomplete="current-password" placeholder="留空保留既有密碼">
                    <span class="field-hint" id="passwordHint"></span>
                </div>
                <label class="toggle-row" for="settingsHeadless">
                    <input type="checkbox" id="settingsHeadless">
                    <span>HEADLESS（背景執行，不顯示瀏覽器視窗）</span>
                </label>
            </div>
            <div class="settings-actions">
                <button class="btn btn--secondary" onclick="loadSettings()">
                    <span>↻</span> 重新讀取
                </button>
                <button class="btn btn--primary" onclick="saveSettings()">
                    <span>✓</span> 儲存設定
                </button>
            </div>
            <div class="settings-path" id="settingsPath"></div>
        </section>

        <section class="settings-section">
            <div class="settings-header">
                <div class="section-label">
                    <span class="section-label__dot"></span>
                    產品規則
                </div>
                <a class="back-link" href="/settings/products">醫院產品矩陣 →</a>
            </div>
            <p class="section-copy">
                設定每間醫院、每個科別要建立的 CRM 產品 SKU，包含 Eligard 不同月份劑量。
            </p>
        </section>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        document.addEventListener('DOMContentLoaded', loadSettings);

        async function loadSettings() {
            try {
                const res = await fetch('/api/settings');
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || '設定讀取失敗');

                document.getElementById('settingsBaseUrl').value = data.crm_base_url || '';
                document.getElementById('settingsUsername').value = data.crm_username || '';
                document.getElementById('settingsPassword').value = '';
                document.getElementById('settingsHeadless').checked = !!data.headless;
                renderStatus(data);
            } catch (err) {
                renderStatus({ is_configured: false });
                showToast(`設定讀取失敗: ${err.message}`, 'warning');
            }
        }

        async function saveSettings() {
            const payload = {
                crm_base_url: document.getElementById('settingsBaseUrl').value.trim(),
                crm_username: document.getElementById('settingsUsername').value.trim(),
                crm_password: document.getElementById('settingsPassword').value,
                headless: document.getElementById('settingsHeadless').checked,
            };

            try {
                const res = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || '設定儲存失敗');

                document.getElementById('settingsPassword').value = '';
                renderStatus(data);
                showToast('✅ 設定已儲存');
            } catch (err) {
                showToast(`設定儲存失敗: ${err.message}`, 'warning');
            }
        }

        function renderStatus(data) {
            const status = document.getElementById('settingsStatus');
            const configured = !!data.is_configured;
            status.className = `settings-status ${configured ? 'ready' : 'missing'}`;
            status.textContent = configured ? '設定完成' : '尚未設定';

            document.getElementById('passwordHint').textContent =
                data.has_password ? '已儲存密碼，留空即保留' : '尚未設定密碼';
            document.getElementById('settingsPath').textContent =
                data.settings_path ? `設定檔位置: ${data.settings_path}` : '';
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type || ''}`;
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>

</body>

</html>
