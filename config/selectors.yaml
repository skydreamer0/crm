# CRM 選擇器對照表 — Selectors Configuration
# 統一管理所有 CRM 頁面的 DOM 選擇器
# 如果 CRM 改版，只需修改此檔案而非搜尋整個 Python 程式碼

crm:
  # === 通用元素 ===
  common:
    content_iframe: "iframe#contentIFrame0"
    # 根據實際 DOM 診斷結果 (2026-04-17):
    #   Save img:  class="ms-crm-commandbar-image16by16" src="/_imgs/ribbon/Save_16.png"
    #   Save li:   command="...Mscrm.SavePrimary" 或 command="...BookOrReschedule"
    #   SaveClose: command="...Mscrm.SaveAndClosePrimary"
    save_button: "img.ms-crm-commandbar-image16by16[src*='Save_16'], li[command*='SavePrimary'], li[command*='BookOrReschedule']"
    save_and_close_button: "img.ms-crm-commandbar-image16by16[src*='SaveAndClose_16'], li[command*='SaveAndClosePrimary']"

  # === 日報相關 ===
  daily_report:
    date_input: "input#DateInput"

  # === 約會記錄 Popup ===
  appointment:
    # 新增約會按鈕 (在日報主頁 subgrid 區塊內)
    add_button_primary: "img#details_addImageButtonImage"
    add_button_fallback_title: 'img[title*="新增 約會 記錄"]'
    add_button_fallback_class: "img.ms-crm-add-button-icon"

    # 拜訪對象
    customer_input: "div#new_abc"

    # 實際拜訪時段
    period_div: "div#new_actualvisitperiod"
    period_select: "select#new_actualvisitperiod_i"
    period_options: "select#new_actualvisitperiod_i option"

    # 拜訪描述
    visit_description: "div#new_vst_text"

    # 完成事項 checkbox
    checkbox_iframe: "iframe#WebResource_checkbox"
    checkbox_product_intro: "input#id100000002"
    checkbox_product_intro_fallback: "input[value='100000002']"

  # === 產品介紹明細 Popup ===
  product:
    # 新增產品按鈕 (在約會 Popup 內)
    add_product_button: "img#core_addImageButtonImage"

    # 產品搜尋欄位
    product_input: "div#new_product"
    # 就緒訊號: CRM JS 綁定完 lookup 行為後才會加上 data-initialized="true"
    # (依 docs/product_fields/product_popup_frame_1.html:4394 實際 DOM)
    product_ready: "div#new_product[data-initialized='true']"
    product_dropdown_menu: "ul#new_product_i_IMenu"

    # 拜訪內容 (實際 DOM id 為 new_callnotes)
    visit_item: "div#new_callnotes, div#new_callnotes_c, div#new_callnotes_d"

    # 拜訪目的
    visit_purpose: "div#new_visitpurpose"

    # 產品明細 subgrid 驗證 (填寫後讀取 CRM 實際記錄數)
    # 狀態列「共 N 個」計數器 (依 2026-04 DOM dump: span#core_ItemsTotal)
    subgrid_total: "span#core_ItemsTotal"
    # 資料列 fallback (計數器讀不到時直接數列)
    subgrid_rows: "div#core_divDataArea tr.ms-crm-List-Row"
