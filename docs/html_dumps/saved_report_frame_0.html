				function getOffset(month) {
					var localDate = new Date(new Date().getFullYear(), month, 1, 0, 0, 0, 0);
					var temp = localDate.toGMTString();
					var utcDate = new Date(temp.substring(0, temp.lastIndexOf(' ') - 1));
					var timeZoneOffset = (utcDate - localDate) / (1000 * 60);
					return timeZoneOffset;
				}

				if (typeof UPDATE_TIMEZONE != 'undefined' && UPDATE_TIMEZONE == 1) {
					// find the offset as of January 1
					var januaryOffset = getOffset(0);

					// find the offset as of June 1
					var juneOffset = getOffset(5);

					// default the value passed on to the offset calculated as of January
					var offset = januaryOffset;

					// calculate the difference between the offsets (differences due to Daylight Savings Time)
					var diff = juneOffset - januaryOffset;

					// if the June offset is greater than the January offset, then we should use the June value (happens in the Southern hemisphere)
					if (diff > 0) {
						offset = juneOffset;
					}

					var command = new RemoteCommand('UserManager', 'UpdateUserTimeZone');
					command.SetParameter('offsetValue', offset);
					command.Execute();
				}
